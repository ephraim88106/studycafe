  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복지 아티클</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-color, #f8fafc); color: var(--text-color, #1e293b); }
    .article-container { max-width: 780px; margin: 0 auto; padding: 40px 20px 80px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #64748b; font-size: 0.9rem; text-decoration: none; margin-bottom: 24px; cursor: pointer; background: none; border: none; padding: 0; }
    .back-btn:hover { color: #1e293b; }
    .article-tag { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; background: linear-gradient(135deg, #e0f2fe, #dbeafe); color: #0369a1; margin-bottom: 12px; letter-spacing: 0.02em; }
    .article-title { font-size: 1.8rem; font-weight: 900; line-height: 1.35; margin-bottom: 12px; letter-spacing: -0.02em; }
    .article-meta { color: #94a3b8; font-size: 0.85rem; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
    .article-body { font-size: 1.02rem; line-height: 1.9; }
    .article-body p { margin-bottom: 18px; }
    .article-body ul { margin: 16px 0; padding-left: 20px; }
    .article-body li { margin-bottom: 10px; line-height: 1.75; }
    .article-body strong { color: #0f172a; }
    .article-body h3 { font-size: 1.3rem; font-weight: 800; margin: 36px 0 16px; color: #0f172a; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
    .article-body h4 { font-size: 1.1rem; font-weight: 700; margin: 28px 0 12px; color: #1e40af; }
    .highlight-box { background: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 24px 0; font-style: italic; color: #0369a1; font-size: 1rem; }
    .not-found { text-align: center; padding: 80px 20px; color: #94a3b8; }

    /* ===== 도표 (Table) ===== */
    .article-body table { width: 100%; border-collapse: collapse; margin: 24px 0; font-size: 0.92rem; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .article-body thead th { background: linear-gradient(135deg, #1e40af, #2563eb); color: white; padding: 13px 16px; text-align: left; font-weight: 700; font-size: 0.88rem; letter-spacing: 0.01em; }
    .article-body tbody td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
    .article-body tbody tr:last-child td { border-bottom: none; }
    .article-body tbody tr:nth-child(even) { background: #f8fafc; }
    .article-body tbody tr:hover { background: #eff6ff; }
    .article-body .td-highlight { font-weight: 700; color: #1e40af; }

    /* ===== 인포 박스 ===== */
    .info-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 20px 24px; margin: 24px 0; }
    .info-box.blue { background: #eff6ff; border-color: #bfdbfe; }
    .info-box.amber { background: #fffbeb; border-color: #fde68a; }
    .info-box.red { background: #fef2f2; border-color: #fecaca; }
    .info-box .info-title { font-weight: 800; font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .info-box.blue .info-title { color: #1e40af; }
    .info-box .info-title { color: #166534; }
    .info-box.amber .info-title { color: #92400e; }
    .info-box.red .info-title { color: #991b1b; }
    .info-box p { margin: 0; font-size: 0.95rem; line-height: 1.7; }

    /* ===== 수평 바 차트 ===== */
    .bar-chart { margin: 24px 0; }
    .bar-chart .bar-item { margin-bottom: 14px; }
    .bar-chart .bar-label { font-size: 0.88rem; font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
    .bar-chart .bar-label .bar-value { color: #2563eb; font-weight: 800; }
    .bar-chart .bar-track { background: #e2e8f0; border-radius: 6px; height: 14px; overflow: hidden; }
    .bar-chart .bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #2563eb, #7c3aed); transition: width 0.6s ease; }

    /* ===== 비교 카드 ===== */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
    .compare-card { border-radius: 12px; padding: 20px; text-align: center; }
    .compare-card.before { background: #f1f5f9; border: 1px solid #e2e8f0; }
    .compare-card.after { background: #eff6ff; border: 2px solid #2563eb; }
    .compare-card .compare-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .compare-card.before .compare-label { color: #64748b; }
    .compare-card.after .compare-label { color: #2563eb; }
    .compare-card .compare-value { font-size: 1.6rem; font-weight: 900; }
    .compare-card.before .compare-value { color: #475569; }
    .compare-card.after .compare-value { color: #1e40af; }
    .compare-card .compare-desc { font-size: 0.82rem; color: #64748b; margin-top: 4px; }

    /* ===== 타임라인 ===== */
    .timeline { margin: 24px 0; padding-left: 24px; border-left: 3px solid #2563eb; }
    .timeline .tl-item { position: relative; padding: 0 0 24px 20px; }
    .timeline .tl-item:last-child { padding-bottom: 0; }
    .timeline .tl-item::before { content: ''; position: absolute; left: -31px; top: 4px; width: 12px; height: 12px; background: #2563eb; border-radius: 50%; border: 3px solid #eff6ff; }
    .timeline .tl-date { font-size: 0.8rem; font-weight: 700; color: #2563eb; margin-bottom: 4px; }
    .timeline .tl-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .timeline .tl-desc { font-size: 0.88rem; color: #64748b; }

    /* ===== 키 넘버 카드 ===== */
    .key-numbers { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin: 24px 0; }
    .key-num { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px 14px; text-align: center; }
    .key-num .num { font-size: 1.5rem; font-weight: 900; color: #2563eb; display: block; }
    .key-num .num-label { font-size: 0.8rem; color: #64748b; margin-top: 4px; display: block; }

    /* ===== 요약 카드 ===== */
    .summary-card { background: linear-gradient(135deg, #1e40af, #7c3aed); color: white; border-radius: 16px; padding: 28px; margin: 28px 0; }
    .summary-card h4 { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
    .summary-card p { font-size: 0.95rem; line-height: 1.7; opacity: 0.92; margin: 0; }
    .summary-card ul { margin: 10px 0 0; padding-left: 18px; }
    .summary-card li { margin-bottom: 6px; font-size: 0.92rem; opacity: 0.92; }

    /* ===== 구분선 ===== */
    .article-body hr { border: none; height: 1px; background: #e2e8f0; margin: 36px 0; }

    /* ===== 반응형 ===== */
    @media (max-width: 600px) {
      .article-title { font-size: 1.4rem; }
      .compare-grid { grid-template-columns: 1fr; }
      .key-numbers { grid-template-columns: repeat(2, 1fr); }
      .article-body table { font-size: 0.82rem; }
      .article-body thead th, .article-body tbody td { padding: 10px 10px; }
    }
  </style>
</head>
<body>
  <div class="article-container">
    <button class="back-btn" onclick="history.back()">← 목록으로</button>
    <div id="article-content">
      <div class="not-found">글을 불러오는 중...</div>
    </div>
    <!-- Coupang Partners -->
    <div style="margin-top:40px; padding:28px; background:#fff; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,0.06); text-align:center;">
      <a href="https://link.coupang.com/a/eiMhxP" target="_blank" rel="noopener noreferrer" style="display:inline-block; padding:14px 36px; background:linear-gradient(135deg,#e52528,#ae1f23); color:#fff; font-size:1.05rem; font-weight:800; border-radius:9999px; text-decoration:none; box-shadow:0 4px 15px rgba(229,37,40,0.3); transition:opacity 0.2s, transform 0.2s;" onmouseover="this.style.opacity='0.9';this.style.transform='scale(1.03)'" onmouseout="this.style.opacity='1';this.style.transform='scale(1)'">
        쿠팡에서 쇼핑하기
      </a>
      <p style="margin-top:12px; font-size:0.78rem; color:#94a3b8; line-height:1.6;">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</p>
    </div>
  </div>
  <script type="module">
    import { newsArticles, insightArticles } from './posts.js';

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const type = params.get('type') || 'news';
    const articles = type === 'insight' ? insightArticles : newsArticles;
    const article = articles.find(a => a.id === id);
    const container = document.getElementById('article-content');

    if (!article) {
      container.innerHTML = '<div class="not-found">글을 찾을 수 없습니다.</div>';
    } else if (type === 'news') {
      document.title = article.title + ' | WelfareFinder';
      container.innerHTML = `
        <div class="article-tag">복지 뉴스</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">${article.date}</div>
        <div class="article-body">${article.content || '<p>' + article.summary + '</p>'}</div>
      `;
    } else {
      document.title = article.title + ' | WelfareFinder';
      const listHtml = article.list ? article.list.map(i => `<li><strong>${i.strong}</strong> ${i.text}</li>`).join('') : '';
      const parasHtml = article.paragraphs ? article.paragraphs.map(p => `<p>${p}</p>`).join('') : '';
      container.innerHTML = `
        <div class="article-tag">${article.tagLabel || '인사이트'}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">인사이트 아티클</div>
        <div class="article-body">
          ${parasHtml}
          ${listHtml ? '<ul>' + listHtml + '</ul>' : ''}
          ${article.highlight ? '<div class="highlight-box">' + article.highlight + '</div>' : ''}
        </div>
      `;
    }
  </script>
