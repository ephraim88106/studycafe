<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복지 아티클</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-color, #f8fafc); color: var(--text-color, #1e293b); }
    .article-container { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #64748b; font-size: 0.9rem; text-decoration: none; margin-bottom: 24px; cursor: pointer; background: none; border: none; padding: 0; }
    .back-btn:hover { color: #1e293b; }
    .article-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: #e0f2fe; color: #0369a1; margin-bottom: 12px; }
    .article-title { font-size: 1.6rem; font-weight: 900; line-height: 1.4; margin-bottom: 12px; }
    .article-meta { color: #94a3b8; font-size: 0.85rem; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
    .article-body p { margin-bottom: 16px; line-height: 1.85; font-size: 1rem; }
    .article-body ul { margin: 16px 0; padding-left: 20px; }
    .article-body li { margin-bottom: 10px; line-height: 1.7; }
    .article-body strong { color: #0f172a; }
    .highlight-box { background: #f0f9ff; border-left: 4px solid #0ea5e9; padding: 16px 20px; border-radius: 0 8px 8px 0; margin: 24px 0; font-style: italic; color: #0369a1; font-size: 1rem; }
    .not-found { text-align: center; padding: 80px 20px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="article-container">
    <button class="back-btn" onclick="history.back()">← 목록으로</button>
    <div id="article-content">
      <div class="not-found">글을 불러오는 중...</div>
    </div>
  </div>
  <script type="module">
    import { newsArticles, insightArticles } from './posts.js';

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const type = params.get('type') || 'news';
    const articles = type === 'insight' ? insightArticles : newsArticles;
    const article = articles.find(a => a.id === id);
    const container = document.getElementById('article-content');

    if (!article) {
      container.innerHTML = '<div class="not-found">글을 찾을 수 없습니다.</div>';
    } else if (type === 'news') {
      document.title = article.title + ' | 복지헬퍼';
      container.innerHTML = `
        <div class="article-tag">복지 뉴스</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">${article.date}</div>
        <div class="article-body">${article.content || '<p>' + article.summary + '</p>'}</div>
      `;
    } else {
      document.title = article.title + ' | 복지헬퍼';
      const listHtml = article.list ? article.list.map(i => `<li><strong>${i.strong}</strong> ${i.text}</li>`).join('') : '';
      const parasHtml = article.paragraphs ? article.paragraphs.map(p => `<p>${p}</p>`).join('') : '';
      container.innerHTML = `
        <div class="article-tag">${article.tagLabel || '인사이트'}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">인사이트 아티클</div>
        <div class="article-body">
          ${parasHtml}
          ${listHtml ? '<ul>' + listHtml + '</ul>' : ''}
          ${article.highlight ? '<div class="highlight-box">' + article.highlight + '</div>' : ''}
        </div>
      `;
    }
  </script>
</body>
</html>
