<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WelfareFinder - 맞춤형 복지 정책 검색 서비스</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs (CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        const firebaseConfig = {
            projectId: "test-06147957",
        };
        const app = initializeApp(firebaseConfig);
        console.log("Firebase app initialized");
    </script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-hand-holding-heart"></i> Welfare<span>Finder</span>
            </div>
            <div class="nav-controls">
                <button class="theme-toggle" id="themeToggle" aria-label="테마 변경">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="login-btn">로그인</button>
            </div>
        </nav>
    </header>

    <main id="app">
        <!-- 히어로 및 검색 섹션 -->
        <section class="hero-section">
            <div class="hero-content">
                <h1>당신에게 꼭 맞는 <br>복지 혜택, 지금 확인하세요</h1>
                <p>생애주기, 소득수준, 관심사에 맞춘 다양한 정부 지원 정책을 쉽고 빠르게 찾아드립니다.</p>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="어떤 복지 정책을 찾고 계신가요? (예: 청년, 주거, 의료)">
                    <button id="searchBtn" class="search-btn">검색</button>
                </div>
            </div>
        </section>

        <!-- 카테고리 필터 섹션 -->
        <section class="filter-section">
            <div class="filter-container">
                <button class="filter-chip active" data-category="all">전체보기</button>
                <button class="filter-chip" data-category="youth">청년</button>
                <button class="filter-chip" data-category="marriage">신혼부부</button>
                <button class="filter-chip" data-category="family">가족/여성</button>
                <button class="filter-chip" data-category="elderly">노인</button>
                <button class="filter-chip" data-category="housing">주거자금</button>
                <button class="filter-chip" data-category="medical">의료/건강</button>
                <button class="filter-chip" data-category="job">일자리/창업</button>
            </div>
        </section>

        <!-- 맞춤형 복지 정책 리스트 섹션 -->
        <section class="policy-list-section">
            <div class="section-header">
                <h2>추천 복지 정책 <span class="result-count" id="resultCount">0</span>건</h2>
            </div>
            <div class="policy-grid" id="policyGrid">
                <!-- <policy-card> 컴포넌트가 JS를 통해 이곳에 렌더링됩니다. -->
            </div>
            <div id="noResults" class="no-results hidden">
                <i class="fas fa-exclamation-circle"></i>
                <p>검색 결과가 없습니다. 다른 키워드나 조건으로 검색해 보세요.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <h3>정부 공식 복지 포털 바로가기</h3>
                <div class="portal-grid">
                    <a href="https://www.bokjiro.go.kr" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> 복지로</a>
                    <a href="https://www.gov.kr" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> 정부24</a>
                    <a href="https://www.youthcenter.go.kr" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> 온통청년</a>
                    <a href="https://www.work.go.kr" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> 워크넷</a>
                </div>
            </div>
            <div class="footer-bottom">
                <div class="footer-logo">Welfare<span>Finder</span></div>
                <p>본 사이트는 국민의 편의를 위해 맞춤형 복지 정보를 제공하는 시뮬레이션 서비스입니다.</p>
                <p>&copy; 2026 WelfareFinder. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
