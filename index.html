<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Studio Web Project</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs (CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            projectId: "test-06147957",
            // Note: In Firebase Studio environment, other config values 
            // are often automatically populated or handled by the platform.
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        console.log("Firebase app initialized for project: test-06147957");
    </script>
</head>
<body>
    <div id="app">
        <h1>Welcome to Firebase Studio</h1>
        <p>Project: test-06147957</p>
        <div id="status">연결 확인 중...</div>
        <button class="theme-toggle" id="themeToggle">다크 모드로 전환</button>

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xgonjgae" method="POST" id="contactForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="제휴 관련 문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
